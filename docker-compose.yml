services:
  # ── MQTT Broker ──────────────────────────────────────
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: thesis-mosquitto
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket (for dashboard)
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_sub -t '$$SYS/#' -C 1 -W 3 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ── FastAPI Server ───────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: thesis-server
    ports:
      - "8000:8000"
    env_file:
      - ./server/.env
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - DATABASE_URL=sqlite+aiosqlite:///./data/thesis.db
      - VLLM_BASE_URL=http://host.docker.internal:8001/v1
      - TZ=Europe/Brussels
    volumes:
      - ./server/app:/app/app         # Hot reload in dev
      - server_data:/app/data         # Persistent DB + uploads
    depends_on:
      mosquitto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; r = httpx.get('http://localhost:8000/health'); r.raise_for_status()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  # ── Next.js Dashboard ───────────────────────────────
  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    container_name: thesis-dashboard
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_MQTT_WS_URL=ws://localhost:9001
    depends_on:
      - server
      - mosquitto
    restart: unless-stopped

volumes:
  mosquitto_data:
  mosquitto_log:
  server_data:
