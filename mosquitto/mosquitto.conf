# Mosquitto MQTT Broker Configuration
# Thesis: Autonomous IoT Visual Monitoring

# ── Listeners ──────────────────────────────────────────
listener 1883
protocol mqtt

listener 9001
protocol websockets

# ── Security (dev mode — anonymous allowed) ────────────
allow_anonymous true

# ── Persistence ────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ── Logging ────────────────────────────────────────────
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
