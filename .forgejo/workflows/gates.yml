name: Governance Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gates:
    name: Governance Gates
    runs-on: ubuntu-latest
    steps:
      - uses: https://code.forgejo.org/actions/checkout@v4
      - name: Setup Node.js
        uses: https://code.forgejo.org/actions/setup-node@v4
        with:
          node-version: '22'
      - run: npm ci
      - name: Setup Python
        uses: https://code.forgejo.org/actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python deps (best-effort)
        shell: bash
        run: pip install -r requirements.txt 2>/dev/null || true
      - name: "server (working-directory: server): python -m pytest tests/ -v --tb=short"
        run: |
          python -m pytest tests/ -v --tb=short
      - name: "dashboard (working-directory: dashboard): npx biome check --no-errors-on-unmatched --diagnostic-lev..."
        run: |
          npx biome check --no-errors-on-unmatched --diagnostic-level=error
      - name: "dashboard (working-directory: dashboard): npx tsc --noEmit"
        run: |
          npx tsc --noEmit
      - name: "dashboard (working-directory: dashboard): npm run build"
        run: |
          npm run build
      - name: "firmware (working-directory: firmware): make -j8"
        run: |
          make -j8

# crag:auto-end
