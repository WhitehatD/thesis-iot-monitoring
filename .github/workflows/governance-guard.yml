name: Governance Guard

on:
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.forgejo/workflows/**'
      - '.gitea/workflows/**'
      - '.gitlab-ci.yml'
      - '.circleci/**'
      - '.travis.yml'
      - 'azure-pipelines.yml'
      - '.buildkite/**'
      - '.drone.yml'
      - '.woodpecker/**'
      - 'bitbucket-pipelines.yml'
      - 'Jenkinsfile'
      - '.cirrus.yml'
      - 'Makefile'
      - 'Taskfile.yml'
      - 'justfile'

jobs:
  guard:
    name: "CI \u2194 Governance Sync"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Check CI and governance are in sync
        run: npx @whitehatd/crag diff --ci

# crag:auto-end
