name: Thesis IoT CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1: Server Tests
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          MQTT_BROKER_HOST: "localhost"
          MQTT_BROKER_PORT: "1883"
        run: |
          python -m pytest tests/ -v --tb=short

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1.5: Build & Upload Firmware
  # ══════════════════════════════════════════════════════════════════════════
  build-firmware:
    name: Build & Upload Firmware
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build Firmware
        working-directory: firmware
        run: make -j8

      - name: Upload Firmware to Server
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_SERVER_URL }}
          FIRMWARE_TOKEN: ${{ secrets.FIRMWARE_UPLOAD_TOKEN }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠️  DEPLOY_SERVER_URL secret not configured — skipping upload"
            exit 0
          fi
          
          # Extract version from firmware_config.h
          FW_VERSION=$(grep 'define FW_VERSION' firmware/Core/Inc/firmware_config.h | awk -F '"' '{print $2}')
          echo "📤 Uploading firmware v${FW_VERSION}..."
          
          HTTP_CODE=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
            -X POST "${DEPLOY_URL}/api/firmware/upload?version=${FW_VERSION}" \
            -H "X-Firmware-Token: ${FIRMWARE_TOKEN}" \
            -F "file=@firmware/build/thesis-iot-firmware.bin" \
            --connect-timeout 15 \
            --max-time 60) || true
            
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Firmware uploaded successfully"
            cat /tmp/upload_resp.json
            echo ""
          else
            echo "❌ HTTP $HTTP_CODE — upload failed (likely MQTT disconnect fallback):"
            cat /tmp/upload_resp.json 2>/dev/null || echo "(no response body)"
            echo "Continuing pipeline to allow server deployment to proceed..."
          fi

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 2: Build & Push Docker Images
  # ══════════════════════════════════════════════════════════════════════════
  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thesis-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thesis-dashboard" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 3: Automated Infrastructure Deployment
  # ══════════════════════════════════════════════════════════════════════════
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-server, build-dashboard]
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Execute Remote SSH Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            # Find the deployment directory containing our docker-compose.prod.yml
            # We search in /root, /home, /opt, /var/www to handle different deployment users natively
            FILE_PATH=$(find /root /home /opt /var/www -maxdepth 4 -type f -name "docker-compose.prod.yml" 2>/dev/null | head -n 1)
            
            if [ -z "$FILE_PATH" ]; then
              echo "Deployment directory not found on VPS! Attempting to clone from GitHub..."
              cd ~
              git clone https://github.com/${GITHUB_REPOSITORY}.git thesis-iot-monitoring || { echo "Clone failed"; exit 1; }
              cd thesis-iot-monitoring
            else
              DEPLOY_DIR=$(dirname "$FILE_PATH")
              echo "Found deployment directory at $DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              git pull origin main
            fi
            
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans

