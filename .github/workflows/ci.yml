name: Thesis IoT CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1: Server Tests
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          MQTT_BROKER_HOST: "localhost"
          MQTT_BROKER_PORT: "1883"
        run: |
          python -m pytest tests/ -v --tb=short

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1.5: Build & Upload Firmware
  # ══════════════════════════════════════════════════════════════════════════
  build-firmware:
    name: Build & Upload Firmware
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build Firmware
        working-directory: firmware
        run: make -j8

      - name: Upload Firmware to Server
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_SERVER_URL }}
          FIRMWARE_TOKEN: ${{ secrets.FIRMWARE_UPLOAD_TOKEN }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠️  DEPLOY_SERVER_URL secret not configured — skipping upload"
            exit 0
          fi
          
          # Extract version from firmware_config.h
          FW_VERSION=$(grep 'define FW_VERSION' firmware/Core/Inc/firmware_config.h | awk -F '"' '{print $2}')
          echo "📤 Uploading firmware v${FW_VERSION}..."
          
          HTTP_CODE=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
            -X POST "${DEPLOY_URL}/api/firmware/upload" \
            -H "X-Firmware-Token: ${FIRMWARE_TOKEN}" \
            -F "version=${FW_VERSION}" \
            -F "file=@firmware/build/thesis-iot-firmware.bin" \
            --connect-timeout 15 \
            --max-time 60) || true
            
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Firmware uploaded successfully"
            cat /tmp/upload_resp.json
            echo ""
          else
            echo "❌ HTTP $HTTP_CODE — upload failed:"
            cat /tmp/upload_resp.json 2>/dev/null || echo "(no response body)"
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 2: Build & Push Docker Images
  # ══════════════════════════════════════════════════════════════════════════
  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thesis-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thesis-dashboard" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 3: Notify Board (OTA Update Available)
  #
  #  After a successful deploy, calls the server's REST API which publishes
  #  an MQTT message so the STM32 board initiates its OTA version-check flow.
  #
  #  Requires GitHub secrets:
  #    DEPLOY_SERVER_URL     — Base URL of the deployed server
  #    FIRMWARE_UPLOAD_TOKEN — Auth token matching server config
  # ══════════════════════════════════════════════════════════════════════════
  notify-board:
    name: Notify Board (OTA)
    runs-on: ubuntu-latest
    needs: [build-server, build-dashboard, build-firmware]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Wait for container auto-update
        run: |
          echo "⏳ Waiting 30s for Watchtower to pull new images..."
          sleep 30

      - name: Trigger OTA notification via server API
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_SERVER_URL }}
          FIRMWARE_TOKEN: ${{ secrets.FIRMWARE_UPLOAD_TOKEN }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠️  DEPLOY_SERVER_URL secret not configured — skipping notification"
            echo "   Set this secret in repo settings to enable OTA notifications"
            exit 0
          fi

          for attempt in 1 2 3; do
            echo "📡 Attempt $attempt/3: POST ${DEPLOY_URL}/api/firmware/notify"

            HTTP_CODE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
              -X POST "${DEPLOY_URL}/api/firmware/notify?commit_sha=${{ github.sha }}" \
              -H "X-Firmware-Token: ${FIRMWARE_TOKEN}" \
              -H "Content-Type: application/json" \
              --connect-timeout 10 \
              --max-time 30) || true

            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Board notified successfully"
              echo "── Response ──"
              cat /tmp/response.json
              echo ""
              exit 0
            fi

            echo "⚠️  HTTP $HTTP_CODE — response:"
            cat /tmp/response.json 2>/dev/null || echo "(no response body)"
            echo ""

            if [ "$attempt" -lt 3 ]; then
              WAIT=$((attempt * 10))
              echo "   Retrying in ${WAIT}s..."
              sleep $WAIT
            fi
          done

          echo "❌ Failed to notify board after 3 attempts"
          exit 1

