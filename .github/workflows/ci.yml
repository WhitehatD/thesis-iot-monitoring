name: Thesis IoT CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 0: Adaptive Changes Check
  # ══════════════════════════════════════════════════════════════════════════
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      dashboard: ${{ steps.filter.outputs.dashboard }}
      firmware: ${{ steps.filter.outputs.firmware }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
              - '.github/workflows/**'
            dashboard:
              - 'dashboard/**'
              - '.github/workflows/**'
            firmware:
              - 'firmware/**'
              - '.github/workflows/**'

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1: Validations & Tests
  # ══════════════════════════════════════════════════════════════════════════
  test-server:
    name: Backend Tests (Server)
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.server == 'true'
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          MQTT_BROKER_HOST: "localhost"
          MQTT_BROKER_PORT: "1883"
        run: |
          python -m pytest tests/ -v --tb=short

  lint-dashboard:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.dashboard == 'true'
    defaults:
      run:
        working-directory: dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Biome Lint & Format Check
        run: npx biome check --no-errors-on-unmatched --diagnostic-level=error

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Next.js Production Build
        run: npm run build

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1.5: Build & Upload Firmware
  # ══════════════════════════════════════════════════════════════════════════
  build-firmware:
    name: Build & Upload Firmware
    runs-on: ubuntu-latest
    needs: changes
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.firmware == 'true'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ARM GCC Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-arm-none-eabi make

      - name: Build Firmware
        working-directory: firmware
        run: make -j8

      - name: Upload Firmware to Server
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_SERVER_URL }}
          FIRMWARE_TOKEN: ${{ secrets.FIRMWARE_UPLOAD_TOKEN }}
        run: |
          if [ -z "$DEPLOY_URL" ]; then
            echo "⚠️  DEPLOY_SERVER_URL secret not configured — skipping upload"
            exit 0
          fi
          
          # ── Enterprise Semantic Versioning Mapping ──
          # Format: 1.0.<commit_count>
          # This maps linearly increasing commit depth to the firmware patch version.
          COMMIT_COUNT=$(git rev-list --count HEAD)
          FW_VERSION="1.0.${COMMIT_COUNT}"
          echo "📤 Uploading firmware v${FW_VERSION}..."
          
          HTTP_CODE=$(curl -s -o /tmp/upload_resp.json -w "%{http_code}" \
            -X POST "${DEPLOY_URL}/api/firmware/upload?version=${FW_VERSION}" \
            -H "X-Firmware-Token: ${FIRMWARE_TOKEN}" \
            -F "file=@firmware/build/thesis-iot-firmware.bin" \
            --connect-timeout 15 \
            --max-time 60)
            
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Firmware uploaded successfully"
            cat /tmp/upload_resp.json
            echo ""
          else
            echo "❌ HTTP $HTTP_CODE — upload failed:"
            cat /tmp/upload_resp.json 2>/dev/null || echo "(no response body)"
            echo "Aborting pipeline to prevent firmware version mismatch..."
            exit 1
          fi

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 2: Build & Push Docker Images
  # ══════════════════════════════════════════════════════════════════════════
  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: [changes, test-server]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.server == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thesis-server" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: [changes, lint-dashboard]
    if: github.ref == 'refs/heads/main' && needs.changes.outputs.dashboard == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: meta
        run: echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/thesis-dashboard" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 3: Automated Infrastructure Deployment
  # ══════════════════════════════════════════════════════════════════════════
  deploy-vps:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [changes, build-server, build-dashboard]
    if: |
      always() && 
      (needs.changes.outputs.server == 'true' || needs.changes.outputs.dashboard == 'true') &&
      needs.build-server.result != 'failure' && needs.build-server.result != 'cancelled' &&
      needs.build-dashboard.result != 'failure' && needs.build-dashboard.result != 'cancelled'
    
    steps:
      - name: Execute Remote SSH Deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          envs: ANTHROPIC_API_KEY,FIRMWARE_UPLOAD_TOKEN,GHCR_TOKEN
          script: |
            # Find the deployment directory containing our docker-compose.prod.yml
            FILE_PATH=$(find /root /home /opt /var/www -maxdepth 4 -type f -name "docker-compose.prod.yml" 2>/dev/null | head -n 1)

            if [ -z "$FILE_PATH" ]; then
              echo "Deployment directory not found on VPS! Attempting to clone..."
              cd ~
              git clone https://github.com/${GITHUB_REPOSITORY}.git thesis-iot-monitoring || { echo "Clone failed"; exit 1; }
              cd thesis-iot-monitoring
            else
              DEPLOY_DIR=$(dirname "$FILE_PATH")
              echo "Found deployment directory at $DEPLOY_DIR"
              cd "$DEPLOY_DIR"
              git pull origin main
            fi

            # Inject secrets into persistent VPS env file
            ENV_FILE="$(pwd)/.env.prod"
            cat > "$ENV_FILE" <<ENVEOF
ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
FIRMWARE_UPLOAD_TOKEN=${FIRMWARE_UPLOAD_TOKEN}
ENVEOF
            chmod 600 "$ENV_FILE"

            set -a
            source "$ENV_FILE"
            set +a

            # Authenticate with GHCR so docker compose pull can fetch private images
            mkdir -p ~/.docker
            echo "$GHCR_TOKEN" | docker login ghcr.io -u github --password-stdin

            # Pull latest images and restart
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FIRMWARE_UPLOAD_TOKEN: ${{ secrets.FIRMWARE_UPLOAD_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
