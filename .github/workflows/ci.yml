name: Thesis IoT CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/thesis-server
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository_owner }}/thesis-dashboard

jobs:
  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 1: Server Tests
  # ══════════════════════════════════════════════════════════════════════════
  test:
    name: Server Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: server/requirements*.txt

      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          DATABASE_URL: "sqlite+aiosqlite://"
          MQTT_BROKER_HOST: "localhost"
          MQTT_BROKER_PORT: "1883"
        run: |
          python -m pytest tests/ -v --tb=short

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 2: Build & Push Docker Images
  # ══════════════════════════════════════════════════════════════════════════
  build-server:
    name: Build Server Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:latest
            ${{ env.SERVER_IMAGE }}:${{ github.sha }}

  build-dashboard:
    name: Build Dashboard Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push dashboard image
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:latest
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}

  # ══════════════════════════════════════════════════════════════════════════
  #  Stage 3: Notify Board (Firmware Update Available)
  #
  #  After a successful deploy, publish an MQTT message so the STM32 board
  #  knows there may be a new firmware version to fetch.
  # ══════════════════════════════════════════════════════════════════════════
  notify-board:
    name: Notify Board
    runs-on: ubuntu-latest
    needs: [build-server, build-dashboard]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Send MQTT notification
        run: |
          echo "CI/CD deploy complete — board will auto-check for updates."
          echo "Commit: ${{ github.sha }}"
          echo "To trigger immediate OTA, publish to MQTT:"
          echo '  {"type": "firmware_update"}'
