name: Governance Gates

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  gates:
    name: Governance Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dashboard deps
        working-directory: dashboard
        run: npm ci

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python deps
        working-directory: server
        run: pip install -r requirements.txt

      - name: "server: pytest"
        working-directory: server
        run: python -m pytest tests/ -v --tb=short

      - name: "dashboard: biome"
        working-directory: dashboard
        run: npx biome check --no-errors-on-unmatched --diagnostic-level=error

      - name: "dashboard: tsc"
        working-directory: dashboard
        run: npx tsc --noEmit

      - name: "dashboard: next build"
        working-directory: dashboard
        run: npm run build

      - name: Install ARM GCC (firmware)
        run: sudo apt-get update && sudo apt-get install -y gcc-arm-none-eabi make

      - name: "firmware: make"
        working-directory: firmware
        run: make -j8

# crag:auto-end
